<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Interviews</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body class="dashboard-page">

<div class="dash-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            InterviewIQ <span>AI</span>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">📊 Dashboard</a>
            <a href="my-interviews.html" class="menu-item active">🎤 My Interviews</a>
            <a href="recommendations.html" class="menu-item">💡 Recommendations</a>
            <a href="profile.html" class="menu-item">👤 Profile</a>
            <a href="landing.html" class="menu-item logout">🚪 Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dash-main">

        <header class="dash-header">
            <div>
                <h1>My Interviews</h1>
                <p class="dash-subtitle">
                    Track all your interview attempts
                </p>
            </div>

            <button type="button" class="btn-start" onclick="location.href='setup-role.html'">
                + New Interview
            </button>
        </header>

        <section class="panel">
            <h3>Interview History</h3>

            <div class="table-wrap">
                <table class="recent-table">
                    <thead>
                    <tr>
                        <th>Role</th>
                        <th>Level</th>
                        <th>Date</th>
                        <th>Score</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody id="interviewTableBody">
                    
                    </tbody>
                </table>
            </div>
        </section>

    </main>

</div>

<script>

const email = localStorage.getItem("email");

async function loadInterviews(){

    if(!email){
        alert("Please login again");
        window.location.href="login.html";
        return;
    }

    try{
        const response = await fetch(
            `http://localhost:8008/interview/my/${email}`
        );

        if (!response.ok) {
            throw new Error("Failed to load interviews.");
        }

        const data = await response.json();

        const tbody = document.getElementById("interviewTableBody");

        tbody.innerHTML="";

        if(!data.success || data.interviews.length===0){

            tbody.innerHTML=`
            <tr>
                <td colspan="6" style="text-align:center">
                    No Interviews Found
                </td>
            </tr>
            `;

            return;
        }

        data.interviews.forEach(interview=>{

            tbody.innerHTML+=`

            <tr>

                <td>${interview.role}</td>
                <td>${interview.experienceLevel}</td>
                <td>${interview.completedAt}</td>
                <td>${interview.finalScore}%</td>
                <td>
                    <span class="badge-success">
                        Completed
                    </span>
                </td>

                <td>
                    <button class="btn-small" onclick="viewReport(${interview.interviewId})">
                        View Report
                    </button>
                </td>

            </tr>

            `;

        });
    }

    catch(error){

        console.error(error);

        document.getElementById("interviewTableBody").innerHTML = `
        <tr>
            <td colspan="6" style="text-align:center;color:red;">
                Unable to load interviews.
            </td>
        </tr>
        `;
    }
}

function viewReport(interviewId){
    
    console.log("Opening report for interview:", interviewId);
    localStorage.setItem("interviewId", interviewId);
    window.location.href = "report.html";

}

loadInterviews();

</script>

</body>
</html>
