<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">

<div class="dash-layout">

    <aside class="sidebar">
        <div class="sidebar-logo">InterviewIQ <span>AI</span></div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">📊 Dashboard</a>
            <a href="my-interviews.html" class="menu-item">🎤 My Interviews</a>
            <a href="recommendations.html" class="menu-item">💡 Recommendations</a>
            <a href="profile.html" class="menu-item">👤 Profile</a>
            <a href="settings.html" class="menu-item active">⚙️ Settings</a>
            <a href="landing.html" class="menu-item logout">🚪 Logout</a>
        </nav>
    </aside>

    <main class="dash-main">

        <header class="dash-header">
            <div>
                <h1>Settings</h1>
                <p class="dash-subtitle">
                    Customize your experience
                </p>
            </div>
        </header>

        <div class="panel">

            <div class="setting-item">
                <div>
                    <label>Email Notifications</label>
                    <p>Receive interview related updates</p>
                </div>
                <input type="checkbox" checked>
            </div>

            <div class="setting-item">
                <div>
                    <label>Weekly Progress Report</label>
                    <p>Get your performance summary every week</p>
                </div>
                <input type="checkbox" checked>
            </div>

            <div class="setting-item">
                <div>
                    <label>Dark Mode</label>
                    <p>Switch to dark theme</p>
                </div>
                <input type="checkbox">
            </div>

            <div class="setting-item">
                <div>
                    <label>Interview Reminder</label>
                    <p>Receive reminders before scheduled interviews</p>
                </div>
                <input type="checkbox" checked>
            </div>

            <button class="btn-start settings-save">
                Save Settings
            </button>

        </div>

    </main>

</div>

</body>
</html>
