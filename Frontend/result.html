<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Result | InterviewIQ AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Poppins', sans-serif;
        }

        html, body {
          height: 100vh;
          overflow: hidden;
          background: #f8f9fc;
          color: #1F2937;
        }

        @keyframes fadeUp {
          from {
            opacity: 0;
            transform: translateY(6px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .result-shell {
          height: 100vh;
          max-width: 1200px;
          margin: 0 auto;
          padding: 14px 24px 16px;
          display: grid;
          grid-template-rows: auto auto auto 1fr;
          gap: 12px;
        }

        .result-shell > * {
          animation: fadeUp 0.4s ease both;
          min-height: 0;
        }

        .result-shell > *:nth-child(2) { animation-delay: 0.04s; }
        .result-shell > *:nth-child(3) { animation-delay: 0.08s; }
        .result-shell > *:nth-child(4) { animation-delay: 0.12s; }

        .result-head {
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 10px;
        }

        .result-head h1 {
          font-size: 20px;
          font-weight: 700;
          color: #111827;
          letter-spacing: -0.4px;
        }

        .result-head p {
          font-size: 12.5px;
          color: #6B7280;
          margin-top: 2px;
        }

        .head-actions {
          display: flex;
          gap: 8px;
        }

        .btn {
          padding: 8px 14px;
          border-radius: 8px;
          font-size: 12.5px;
          font-weight: 500;
          cursor: pointer;
          border: none;
          transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
          text-decoration: none;
          display: inline-flex;
          align-items: center;
          gap: 6px;
        }

        .btn-outline {
          background: white;
          border: 1px solid #E5E7EB;
          color: #374151;
        }

        .btn-outline:hover {
          background: #F3F4F6;
          border-color: #D1D5DB;
        }

        .btn-primary {
          background: linear-gradient(135deg, #6C63FF, #8A7CFF);
          color: white;
          box-shadow: 0 4px 12px rgba(108,99,255,0.28);
        }

        .btn-primary:hover {
          transform: translateY(-2px) scale(1.02);
          box-shadow: 0 8px 20px rgba(108,99,255,0.38);
        }

        .card {
          background: white;
          border-radius: 12px;
          padding: 14px 18px;
          box-shadow: 0 6px 18px rgba(0,0,0,0.05);
          border: 1px solid #F1F2F6;
          display: flex;
          flex-direction: column;
          min-height: 0;
          transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
          transform: translateY(-1px);
          box-shadow: 0 10px 24px rgba(0,0,0,0.07);
        }

        .card h3 {
          font-size: 13px;
          font-weight: 600;
          color: #1F2937;
          margin-bottom: 10px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .score-hero {
          display: flex;
          align-items: center;
          gap: 24px;
          padding: 14px 22px;
        }

        .ring-wrap {
          position: relative;
          flex-shrink: 0;
          width: 100px;
          height: 100px;
        }

        .ring-svg {
          width: 100%;
          height: 100%;
          transform: rotate(-90deg);
        }

        .ring-track {
          fill: none;
          stroke: #EEF0F4;
          stroke-width: 10;
        }

        .ring-fill {
          fill: none;
          stroke: var(--ring-color, #4caf50);
          stroke-width: 10;
          stroke-linecap: round;
          stroke-dasharray: 283;
          stroke-dashoffset: 283;
          transition: stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1),
                      stroke 0.4s ease;
        }

        .ring-text {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
        }

        .ring-text .num {
          font-size: 26px;
          font-weight: 700;
          line-height: 1;
          color: var(--ring-color, #4caf50);
          letter-spacing: -1px;
        }

        .ring-text .denom {
          font-size: 10px;
          font-weight: 500;
          color: #9CA3AF;
          margin-top: 2px;
        }

        .score-info {
          flex: 1;
          min-width: 0;
        }

        .score-info .eyebrow {
          font-size: 11px;
          font-weight: 600;
          color: #6B7280;
          text-transform: uppercase;
          letter-spacing: 0.8px;
          margin-bottom: 6px;
          display: inline-flex;
          align-items: center;
          gap: 6px;
        }

        .score-info .label {
          font-size: 22px;
          font-weight: 700;
          color: #111827;
          letter-spacing: -0.4px;
          margin-bottom: 4px;
          line-height: 1.15;
        }

        .score-info .desc {
          font-size: 12.5px;
          color: #6B7280;
          line-height: 1.5;
        }

        .breakdown {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .bar-row {
          display: grid;
          grid-template-columns: 160px 1fr 80px;
          align-items: center;
          gap: 14px;
        }

        .bar-row .bar-label {
          font-size: 12.5px;
          font-weight: 500;
          color: #374151;
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .bar-track {
          background: #EEF0F4;
          height: 7px;
          border-radius: 999px;
          overflow: hidden;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
        }

        .bar-fill {
          height: 100%;
          width: 0;
          border-radius: 999px;
          transition: width 1.1s cubic-bezier(.2,.8,.2,1);
        }

        .bar-fill.good {
          background: linear-gradient(90deg, #22c55e, #4ade80);
        }

        .bar-fill.mid {
          background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .bar-fill.low {
          background: linear-gradient(90deg, #ff6b6b, #ff8787);
        }

        .bar-value {
          text-align: right;
        }

        .pill {
          display: inline-block;
          padding: 3px 10px;
          border-radius: 999px;
          font-size: 11px;
          font-weight: 600;
          text-transform: capitalize;
          letter-spacing: 0.2px;
        }

        .pill.good {
          background: #ECFDF5;
          color: #15803d;
          border: 1px solid #BBF7D0;
        }

        .pill.mid {
          background: #FFFBEB;
          color: #B45309;
          border: 1px solid #FDE68A;
        }

        .pill.low {
          background: #FEF2F2;
          color: #B91C1C;
          border: 1px solid #FCA5A5;
        }

        .num-val {
          font-size: 12.5px;
          font-weight: 600;
          color: #111827;
        }

        .bottom-row {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 12px;
          min-height: 0;
          align-items: stretch;
        }

        .bottom-row .card {
          height: 100%;
        }

        .feedback-list,
        .check-list {
          list-style: none;
          padding: 0;
          margin: 0;
          display: flex;
          flex-direction: column;
          gap: 8px;
          overflow-y: auto;
          flex: 1;
        }

        .feedback-list li,
        .check-list li {
          display: flex;
          align-items: flex-start;
          gap: 10px;
          font-size: 12.5px;
          color: #374151;
          line-height: 1.5;
        }

        .feedback-list .dot {
          flex-shrink: 0;
          width: 18px;
          height: 18px;
          border-radius: 50%;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 11px;
          font-weight: 700;
          margin-top: 1px;
        }

        .strengths .dot {
          background: #ECFDF5;
          color: #22c55e;
        }

        .weaknesses .dot {
          background: #FEF2F2;
          color: #ff6b6b;
        }

        .icon-check {
          color: #22c55e;
        }

        .icon-warn {
          color: #ff6b6b;
        }

        .icon-bulb {
          color: #6C63FF;
        }

        .check-list li {
          padding: 8px 12px;
          background: #F9FAFB;
          border: 1px solid #F1F2F6;
          border-radius: 8px;
          transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .check-list li:hover {
          background: #F3F4FF;
          border-color: #E0E7FF;
          transform: translateX(2px);
        }

        .check-list .check-box {
          flex-shrink: 0;
          width: 18px;
          height: 18px;
          border-radius: 5px;
          background: #EEF2FF;
          color: #6C63FF;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 11px;
          font-weight: 700;
          margin-top: 1px;
        }

        .feedback-list::-webkit-scrollbar,
        .check-list::-webkit-scrollbar {
          width: 4px;
        }

        .feedback-list::-webkit-scrollbar-thumb,
        .check-list::-webkit-scrollbar-thumb {
          background: #E5E7EB;
          border-radius: 999px;
        }

        .empty {
          text-align: center;
          padding: 60px 20px;
        }

        .empty h2 {
          font-size: 20px;
          font-weight: 600;
          color: #111827;
          margin-bottom: 8px;
        }

        .empty p {
          color: #6B7280;
          margin-bottom: 18px;
        }

        @media (max-height: 640px), (max-width: 760px) {
          html, body {
            height: auto;
            overflow: auto;
          }

          .result-shell {
            height: auto;
            grid-template-rows: none;
          }

          .bottom-row {
            grid-template-columns: 1fr;
          }

          .score-hero {
            flex-direction: column;
            text-align: center;
            gap: 14px;
          }

          .bar-row {
            grid-template-columns: 1fr;
            gap: 4px;
          }

          .bar-value {
            text-align: left;
          }
        }
    </style>
</head>

<body>

<div class="result-shell" id="shell">

    <header class="result-head">
        <div>
            <h1>🎯 Interview Result</h1>
            <p>Here's how you performed in your <span id="roleLabel">interview</span></p>
        </div>

        <div class="head-actions">
            <a href="dashboard.html" class="btn btn-outline">← Back to Dashboard</a>
            <a href="setup-role.html" class="btn btn-primary">Try Again →</a>
        </div>
    </header>

    <section class="card score-hero">

        <div class="ring-wrap" id="ringWrap">

            <svg class="ring-svg" viewBox="0 0 100 100">
                <circle class="ring-track" cx="50" cy="50" r="45"></circle>
                <circle class="ring-fill" cx="50" cy="50" r="45" id="ringFill"></circle>
            </svg>

            <div class="ring-text">
                <span class="num" id="scoreValue">--</span>
                <span class="denom">/ 100</span>
            </div>
        </div>

        <div class="score-info">
            <div class="eyebrow">🎯 Overall Score</div>
            <div class="label" id="scoreLabel">Loading...</div>
            <div class="desc">
                You answered <b id="answeredCount">0</b> questions in your mock interview.
            </div>
        </div>
    </section>

    <section class="card">
        <h3>📊 Score Breakdown</h3>
        <div class="breakdown" id="breakdown"></div>
    </section>

    <div class="bottom-row">

        <section class="card strengths">
            <h3><span class="icon-check">✓</span> Strengths</h3>
            <ul class="feedback-list" id="strengthsList"></ul>
        </section>

        <section class="card weaknesses">
            <h3><span class="icon-warn">⚠</span> Weaknesses</h3>
            <ul class="feedback-list" id="weaknessesList"></ul>
        </section>

        <section class="card">
            <h3><span class="icon-bulb">💡</span> Recommendations</h3>
            <ul class="check-list" id="suggestionsList"></ul>
        </section>

    </div>

</div>

<script>
    const r = JSON.parse(localStorage.getItem("result") || "null");

    document.getElementById("roleLabel").textContent =
      (localStorage.getItem("role") || "interview") + " interview";

    const esc = s => String(s).replace(/[&<>"']/g, c =>
      ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[c])
    );

    const tone = v => v >= 70 ? "good" : v >= 40 ? "mid" : "low";

    if (!r) {
      document.getElementById("shell").innerHTML = `
        <div class="card empty">
          <h2>No result found</h2>
          <p>Please complete an interview first.</p>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>
      `;
    } else {
      render(r);
    }

    function render(r) {

      const score = Math.max(0, Math.min(100, r.score ?? 0));

      const color =
        score > 70 ? "#22c55e" :
        score >= 40 ? "#facc15" :
        "#ff6b6b";

      const label =
        score >= 85 ? "Excellent performance!" :
        score >= 70 ? "Great effort!" :
        score >= 55 ? "Decent — keep practicing." :
        score >= 40 ? "Needs improvement." :
        "Needs more practice.";

      scoreValue.textContent = score;
      scoreLabel.textContent = label;
      answeredCount.textContent = r.answeredCount || 0;

      ringWrap.style.setProperty("--ring-color", color);

      ringFill.style.stroke = color;
      ringFill.style.strokeDashoffset = 283;

      requestAnimationFrame(() =>
        setTimeout(() => {
          ringFill.style.strokeDashoffset = 283 - score * 2.83;
        }, 80)
      );

      const f = r.fillerWords ?? 0;
      const c = r.confidence ?? 0;

      const comm = Math.max(
        0,
        Math.min(100, c - Math.min(40, f * 8) / 2)
      );

      const rel =
        r.relevance === "high" ? 90 :
        r.relevance === "medium" ? 60 :
        25;

      const num = (n, suf) =>
        `<span class="num-val">${n}${suf}</span>`;

      breakdown.innerHTML = [
        ["🎯 Relevance", rel,
          `<span class="pill ${tone(rel)}">${esc(r.relevance || "low")}</span>`
        ],

        ["💪 Confidence", c, num(c, "%")],

        ["🗣 Communication",
          Math.round(comm),
          num(Math.round(comm), "%")
        ],

        ["⏸ Filler Words",
          Math.max(0, 100 - f * 12),
          num(f, " used")
        ]
      ]
      .map(([lbl, v, right]) => `
        <div class="bar-row">

          <div class="bar-label">${lbl}</div>

          <div class="bar-track">
            <div class="bar-fill ${tone(v)}" data-w="${v}"></div>
          </div>

          <div class="bar-value">${right}</div>

        </div>
      `)
      .join("");

      requestAnimationFrame(() => {
        document.querySelectorAll(".bar-fill").forEach((el, i) => {
          setTimeout(() => {
            el.style.width = el.dataset.w + "%";
          }, 150 + i * 110);
        });
      });

      const list = (id, items, icon, cls) => {
        document.getElementById(id).innerHTML =
          (items?.length ? items : ["—"])
          .map(t => `
            <li>
              <span class="${cls}">${icon}</span>
              <span>${esc(t)}</span>
            </li>
          `)
          .join("");
      };

      list("strengthsList", r.strengths, "✓", "dot");

      list("weaknessesList", r.weaknesses, "!", "dot");

      list(
        "suggestionsList",
        r.suggestions?.length
          ? r.suggestions
          : ["Keep practicing weekly to maintain this level."],
        "✓",
        "check-box"
      );
    }
</script>

</body>
</html>
